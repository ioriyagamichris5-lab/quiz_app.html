<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار ذكاء الأعمال والمستندات الإدارية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        appleBlue: '#0071e3',
                        appleGreen: '#34c759',
                    },
                    animation: {
                        'blob-spin': 'blobSpin 20s infinite linear',
                        'star-shift': 'starShift 8s infinite alternate ease-in-out',
                    },
                    keyframes: {
                        blobSpin: {
                            '0%': { transform: 'rotate(0deg) scale(1)' },
                            '50%': { transform: 'rotate(180deg) scale(1.1)' },
                            '100%': { transform: 'rotate(360deg) scale(1)' },
                        },
                        starShift: {
                            '0%': { filter: 'hue-rotate(0deg) blur(80px)' },
                            '100%': { filter: 'hue-rotate(360deg) blur(120px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(30px) saturate(210%);
            -webkit-backdrop-filter: blur(30px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08),
                        inset 0 1px 1px 0 rgba(255, 255, 255, 0.3);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .dark .liquid-glass {
            background: rgba(28, 28, 30, 0.45);
            backdrop-filter: blur(30px) saturate(190%);
            -webkit-backdrop-filter: blur(30px) saturate(190%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0px 0 rgba(255, 255, 255, 0.1);
        }
        .bg-glow-1 { background: linear-gradient(135deg, #ff9f0a, #ff453a); }
        .bg-glow-2 { background: linear-gradient(135deg, #0bf, #5856d6); }
        * {
            transition: background-color 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .option-card {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                        background-color 0.3s ease,
                        box-shadow 0.4s ease;
        }
        .option-card:active { transform: scale(0.98); }

        /* Modal */
        .modal-overlay {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .modal-scroll { max-height: 80vh; overflow-y: auto; }
        .modal-scroll::-webkit-scrollbar { width: 4px; }
        .modal-scroll::-webkit-scrollbar-track { background: transparent; }
        .modal-scroll::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius: 2px; }

        /* AI badge pulse */
        @keyframes aiBadgePulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,113,227,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(0,113,227,0); }
        }
        .ai-badge { animation: aiBadgePulse 2s infinite; }

        /* Feedback overlay */
        .feedback-correct { background: rgba(52,199,89,0.12); border-color: #34c759 !important; }
        .feedback-wrong { background: rgba(255,59,48,0.12); border-color: #ff3b30 !important; }
        .feedback-correct-answer { background: rgba(52,199,89,0.08); border-color: rgba(52,199,89,0.5) !important; }

        textarea, input[type="text"] {
            transition: border-color 0.3s ease, box-shadow 0.3s ease !important;
        }
        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #0071e3;
            box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
        }

        /* Loading dots */
        @keyframes dot { 0%,80%,100%{opacity:0} 40%{opacity:1} }
        .dot1{animation:dot 1.4s infinite .0s}
        .dot2{animation:dot 1.4s infinite .2s}
        .dot3{animation:dot 1.4s infinite .4s}
    </style>
</head>
<body class="bg-[#f5f5f7] dark:bg-[#000000] text-[#1d1d1f] dark:text-[#f5f5f7] min-h-screen overflow-x-hidden relative flex flex-col justify-between select-none">

    <!-- Ambient BG -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full filter blur-[100px] animate-blob-spin opacity-40 dark:opacity-60" style="background: linear-gradient(135deg, #ff9f0a, #ff453a);"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full filter blur-[120px] animate-blob-spin animate-star-shift opacity-40 dark:opacity-60" style="background: linear-gradient(135deg, #00bfff, #5856d6);"></div>
        <div class="absolute top-[40%] left-[40%] w-[30vw] h-[30vw] rounded-full filter blur-[100px] animate-star-shift opacity-20 dark:opacity-40" style="background: linear-gradient(135deg, #34c759, #0071e3);"></div>
    </div>

    <!-- Header -->
    <header class="w-full max-w-4xl mx-auto px-6 pt-6 flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <!-- Claude Real Logo (sun/asterisk shape) -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="11" fill="#D97757"/>
                <line x1="12" y1="4.5" x2="12" y2="19.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <line x1="4.5" y1="12" x2="19.5" y2="12" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <line x1="6.7" y1="6.7" x2="17.3" y2="17.3" stroke="white" stroke-width="2" stroke-linecap="round"/>
                <line x1="17.3" y1="6.7" x2="6.7" y2="17.3" stroke="white" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span class="text-xs font-bold opacity-30">×</span>
            <!-- Gemini Real Logo (4-pointed star) -->
            <svg width="22" height="22" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="gGrad" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="#4285F4"/>
                        <stop offset="50%" stop-color="#8B5CF6"/>
                        <stop offset="100%" stop-color="#4285F4"/>
                    </linearGradient>
                </defs>
                <path d="M12 2 C12 2 13.5 8.5 19 12 C13.5 15.5 12 22 12 22 C12 22 10.5 15.5 5 12 C10.5 8.5 12 2 12 2Z" fill="url(#gGrad)"/>
            </svg>
            <span class="text-sm font-semibold tracking-wide uppercase opacity-60">البوابة التعليمية الذكية</span>
        </div>
        <div class="flex items-center gap-2">
            <!-- Manage Questions Button -->
            <button onclick="openEditor()" class="liquid-glass px-4 py-2.5 rounded-xl font-medium text-sm flex items-center gap-2 hover:scale-105 active:scale-95 cursor-pointer">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                <span>إدارة الأسئلة</span>
            </button>
            <!-- Dark Mode -->
            <button onclick="toggleDarkMode()" class="liquid-glass p-3 rounded-full hover:scale-110 active:scale-95 cursor-pointer">
                <svg class="w-5 h-5 hidden dark:block text-amber-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                <svg class="w-5 h-5 block dark:hidden text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Quiz -->
    <main class="flex-grow flex items-center justify-center p-4 z-10">
        <div id="quiz-card" class="liquid-glass w-full max-w-2xl rounded-3xl p-8 md:p-10 transform scale-100 opacity-100 transition-all duration-500">

            <div class="flex justify-between items-center mb-6 text-xs font-medium opacity-60">
                <span id="unit-tag">الوحدة الأولى</span>
                <span id="progress-text">سؤال 1 من 5</span>
            </div>

            <div class="w-full bg-gray-200 dark:bg-neutral-800 h-[4px] rounded-full mb-8 overflow-hidden">
                <div id="progress-bar" class="bg-appleBlue h-full w-0 transition-all duration-500"></div>
            </div>

            <div id="question-container" class="min-h-[280px] flex flex-col justify-center"></div>
        </div>
    </main>

    <!-- Footer Buttons -->
    <footer class="w-full max-w-2xl mx-auto p-6 flex justify-between items-center gap-4 z-10">
        <button id="prev-btn" onclick="navigateQuestion(-1)" class="liquid-glass px-6 py-3 rounded-xl font-medium text-sm disabled:opacity-30 disabled:pointer-events-none hover:bg-white/20 dark:hover:bg-black/20">
            السابق
        </button>
        <button id="next-btn" onclick="navigateQuestion(1)" class="bg-appleBlue text-white shadow-lg shadow-appleBlue/20 px-8 py-3 rounded-xl font-medium text-sm hover:bg-opacity-90 transition-all active:scale-95">
            التالي
        </button>
    </footer>

    <!-- ============================================================ -->
    <!-- QUESTION EDITOR MODAL -->
    <!-- ============================================================ -->
    <div id="editor-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0" onclick="closeEditor()"></div>
        <div class="liquid-glass relative w-full max-w-2xl rounded-3xl p-6 md:p-8 z-10 modal-scroll">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">إدارة الأسئلة</h2>
                <button onclick="closeEditor()" class="liquid-glass p-2 rounded-full hover:scale-110 active:scale-95 cursor-pointer">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <!-- Question List -->
            <div id="question-list" class="space-y-2 mb-6"></div>

            <!-- Add New Question Form -->
            <div class="liquid-glass rounded-2xl p-5">
                <h3 class="font-semibold mb-4 text-sm opacity-70 uppercase tracking-wide">إضافة سؤال جديد</h3>

                <div class="mb-3">
                    <label class="text-xs font-medium opacity-60 mb-1 block">الوحدة</label>
                    <input id="new-unit" type="text" placeholder="مثال: الوحدة الأولى"
                        class="w-full bg-white/30 dark:bg-neutral-900/40 border border-black/10 dark:border-white/10 rounded-xl px-4 py-2.5 text-sm" />
                </div>

                <div class="mb-3">
                    <label class="text-xs font-medium opacity-60 mb-1 block">نوع السؤال</label>
                    <select id="new-type" onchange="toggleTypeFields()" class="w-full bg-white/30 dark:bg-neutral-900/40 border border-black/10 dark:border-white/10 rounded-xl px-4 py-2.5 text-sm cursor-pointer">
                        <option value="mcq">اختيار من متعدد</option>
                        <option value="open">سؤال مفتوح (تصحيح بالذكاء الاصطناعي)</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="text-xs font-medium opacity-60 mb-1 block">نص السؤال</label>
                    <textarea id="new-question" rows="2" placeholder="اكتب سؤالك هنا..."
                        class="w-full bg-white/30 dark:bg-neutral-900/40 border border-black/10 dark:border-white/10 rounded-xl px-4 py-2.5 text-sm resize-none"></textarea>
                </div>

                <!-- MCQ Options -->
                <div id="mcq-fields">
                    <label class="text-xs font-medium opacity-60 mb-2 block">الخيارات (حدد الإجابة الصحيحة)</label>
                    <div id="options-list" class="space-y-2 mb-3">
                        <!-- rendered dynamically -->
                    </div>
                    <button onclick="addOptionField()" class="text-appleBlue text-sm font-medium flex items-center gap-1 hover:opacity-70">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
                        إضافة خيار
                    </button>
                </div>

                <!-- Open Question model answer -->
                <div id="open-fields" class="hidden">
                    <label class="text-xs font-medium opacity-60 mb-1 block">الإجابة النموذجية (لتوجيه الذكاء الاصطناعي)</label>
                    <textarea id="new-model-answer" rows="3" placeholder="اكتب الإجابة النموذجية أو النقاط الأساسية المطلوبة..."
                        class="w-full bg-white/30 dark:bg-neutral-900/40 border border-black/10 dark:border-white/10 rounded-xl px-4 py-2.5 text-sm resize-none"></textarea>
                </div>

                <button onclick="addQuestion()" class="mt-4 w-full bg-appleBlue text-white rounded-xl py-3 font-semibold text-sm hover:bg-opacity-90 active:scale-95 transition-all">
                    إضافة السؤال
                </button>
            </div>

            <div class="mt-4 flex gap-3">
                <button onclick="applyAndClose()" class="flex-1 bg-appleGreen text-white rounded-xl py-3 font-semibold text-sm hover:bg-opacity-90 active:scale-95 transition-all">
                    حفظ وتطبيق
                </button>
                <button onclick="closeEditor()" class="liquid-glass flex-1 rounded-xl py-3 font-semibold text-sm hover:bg-white/20 active:scale-95">
                    إلغاء
                </button>
            </div>
            <div class="mt-3 flex gap-3">
                <button onclick="exportTemplate()" class="flex-1 liquid-glass rounded-xl py-3 font-semibold text-sm hover:bg-white/20 active:scale-95 flex items-center justify-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    تصدير القالب
                </button>
                <label class="flex-1 liquid-glass rounded-xl py-3 font-semibold text-sm hover:bg-white/20 active:scale-95 flex items-center justify-center gap-2 cursor-pointer">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l4-4m0 0l4 4m-4-4v12"/></svg>
                    استيراد قالب
                    <input type="file" accept=".json" onchange="importTemplate(event)" class="hidden"/>
                </label>
            </div>
        </div>
    </div>

    <script>
    // ─── State ────────────────────────────────────────────────────────────────
    let examDatabase = [];

    let currentIndex = 0;
    const userAnswers = {}; // { idx: value } — for mcq: number, for open: string
    const aiFeedback = {};  // { idx: { score, feedback } }

    // ─── Quiz Rendering ───────────────────────────────────────────────────────
    function renderQuestion() {
        if (!examDatabase.length) {
            const container = document.getElementById('question-container');
            const quizCard = document.getElementById('quiz-card');
            document.getElementById('unit-tag').innerText = 'لا توجد أسئلة';
            document.getElementById('progress-text').innerText = '';
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('prev-btn').disabled = true;
            document.getElementById('next-btn').style.display = 'none';
            container.innerHTML = `
                <div class="text-center py-8">
                    <div class="text-5xl mb-4">📝</div>
                    <h3 class="text-xl font-bold mb-2">لا توجد أسئلة بعد</h3>
                    <p class="text-sm opacity-60 mb-6">ابدأ بإضافة أسئلتك أو استيراد قالب موجود</p>
                    <button onclick="openEditor()" class="bg-appleBlue text-white px-6 py-3 rounded-xl font-semibold text-sm hover:bg-opacity-90 active:scale-95 transition-all">
                        إضافة أسئلة الآن
                    </button>
                </div>`;
            return;
        }
        document.getElementById('next-btn').style.display = '';

        const container = document.getElementById('question-container');
        const quizCard = document.getElementById('quiz-card');
        const q = examDatabase[currentIndex];

        quizCard.classList.add('opacity-0', 'scale-[0.98]');
        setTimeout(() => {
            document.getElementById('unit-tag').innerText = q.unit || 'عام';
            document.getElementById('progress-text').innerText = `سؤال ${currentIndex + 1} من ${examDatabase.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / examDatabase.length) * 100}%`;

            let html = `<h2 class="text-xl font-bold mb-6 tracking-tight leading-relaxed">${q.title}</h2>`;

            if (q.type === 'mcq') {
                html += renderMCQ(q);
            } else if (q.type === 'open') {
                html += renderOpen(q);
            }

            container.innerHTML = html;

            // Wire open question events
            if (q.type === 'open') {
                const ta = document.getElementById('open-answer');
                if (ta) {
                    ta.value = userAnswers[currentIndex] || '';
                    ta.addEventListener('input', () => { userAnswers[currentIndex] = ta.value; });
                }
                // Show existing AI feedback if any
                if (aiFeedback[currentIndex]) {
                    renderAIFeedbackInline(aiFeedback[currentIndex]);
                }
            }

            document.getElementById('prev-btn').disabled = currentIndex === 0;
            if (currentIndex === examDatabase.length - 1) {
                document.getElementById('next-btn').innerText = 'إنهاء الاختبار';
                document.getElementById('next-btn').onclick = showResults;
            } else {
                document.getElementById('next-btn').innerText = 'التالي';
                document.getElementById('next-btn').onclick = () => navigateQuestion(1);
            }

            quizCard.classList.remove('opacity-0', 'scale-[0.98]');
        }, 250);
    }

    function renderMCQ(q) {
        const feedback = aiFeedback[currentIndex]; // won't exist for MCQ but safe
        let html = `<div class="space-y-3">`;
        q.options.forEach((option, index) => {
            const isSelected = userAnswers[currentIndex] === index;
            let cardClass = 'border-black/5 dark:border-white/5 bg-white/30 dark:bg-neutral-900/30 hover:bg-white/60 dark:hover:bg-neutral-900/60';
            if (isSelected) cardClass = 'border-appleBlue bg-appleBlue/10 dark:bg-appleBlue/20 shadow-sm ring-1 ring-appleBlue';
            html += `
                <div onclick="selectOption(${index})" class="option-card border p-4 rounded-xl cursor-pointer flex items-center justify-between text-base font-medium ${cardClass}">
                    <span>${option}</span>
                    <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all ${isSelected ? 'border-appleBlue bg-appleBlue' : 'border-neutral-400'}">
                        ${isSelected ? '<div class="w-2 h-2 rounded-full bg-white"></div>' : ''}
                    </div>
                </div>`;
        });
        html += `</div>`;
        return html;
    }

    function renderOpen(q) {
        return `
        <div>
            <textarea id="open-answer" rows="5" placeholder="اكتب إجابتك هنا..."
                class="w-full bg-white/30 dark:bg-neutral-900/40 border border-black/10 dark:border-white/10 rounded-xl px-4 py-3 text-base resize-none mb-4"></textarea>
            <button onclick="checkWithAI()" id="ai-check-btn"
                class="ai-badge bg-appleBlue text-white px-6 py-2.5 rounded-xl font-semibold text-sm flex items-center gap-2 hover:bg-opacity-90 active:scale-95 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3M6.343 6.343l-.707-.707M17.657 17.657l-.707-.707M12 21v-1"/></svg>
                تصحيح بالذكاء الاصطناعي
            </button>
            <div id="ai-feedback-box"></div>
        </div>`;
    }

    function selectOption(index) {
        userAnswers[currentIndex] = index;
        renderQuestion();
    }

    function navigateQuestion(step) {
        const newIdx = currentIndex + step;
        if (newIdx >= 0 && newIdx < examDatabase.length) {
            currentIndex = newIdx;
            renderQuestion();
        }
    }

    // ─── AI Grading ───────────────────────────────────────────────────────────
    async function checkWithAI() {
        const q = examDatabase[currentIndex];
        const answer = document.getElementById('open-answer')?.value?.trim();
        if (!answer) {
            alert('الرجاء كتابة إجابتك أولاً');
            return;
        }
        userAnswers[currentIndex] = answer;

        const btn = document.getElementById('ai-check-btn');
        const feedbackBox = document.getElementById('ai-feedback-box');

        btn.disabled = true;
        btn.innerHTML = `<span class="dot1 opacity-0">●</span><span class="dot2 opacity-0">●</span><span class="dot3 opacity-0">●</span> جاري التصحيح...`;
        feedbackBox.innerHTML = '';

        const systemPrompt = `أنت مصحح اختبارات تعليمي متساهل ومشجع.
قواعد التصحيح:
- ركّز على المعنى والفهم، وليس على الصياغة الحرفية أو الأخطاء الإملائية الطفيفة
- إذا كانت الإجابة صحيحة في المعنى فأعطها 10/10 حتى لو كانت مختصرة أو بها أخطاء إملائية
- الأرقام المكتوبة بالحروف (مثل "خمسة" بدل "5") تُعتبر صحيحة تماماً
- الأخطاء الإملائية البسيطة لا تُخصم منها درجات أبداً
- إذا أجاب الطالب بالمعنى الصحيح ولو بكلمات مختلفة فأعطه العلامة الكاملة
- كن مشجعاً ولطيفاً في تغذيتك الراجعة
- لا تخصم درجات إلا إذا كان المعنى خاطئاً فعلاً
أجب فقط بـ JSON بالشكل:
{"score": 10, "feedback": "...", "correct": true}
حيث correct يكون true إذا كانت الإجابة صحيحة بشكل كافٍ (6 أو أكثر).`;

        const userPrompt = `السؤال: ${q.title}
الإجابة النموذجية: ${q.modelAnswer || 'لا توجد إجابة نموذجية محددة، صحح بناءً على المعرفة العامة'}
إجابة الطالب: ${answer}`;

        try {
            const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer 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',
                    'HTTP-Referer': 'https://quiz-app.local',
                    'X-Title': 'Quiz App'
                },
                body: JSON.stringify({
                    model: 'openrouter/auto',
                    messages: [
                        { role: 'system', content: systemPrompt },
                        { role: 'user', content: userPrompt }
                    ]
                })
            });
            const data = await res.json();
            console.log('OpenRouter response:', JSON.stringify(data));
            if (data.error) throw new Error(data.error.message);
            const text = data.choices?.[0]?.message?.content || '';
            const clean = text.replace(/```json|```/g, '').trim();
            const parsed = JSON.parse(clean);
            aiFeedback[currentIndex] = parsed;
            renderAIFeedbackInline(parsed);
        } catch (e) {
            console.error('AI grading error:', e);
            feedbackBox.innerHTML = `<div class="mt-4 p-4 rounded-xl border border-red-300 bg-red-50/40 dark:bg-red-900/20 text-sm text-red-500">
                حدث خطأ: ${e.message}
            </div>`;
        }

        btn.disabled = false;
        btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3M6.343 6.343l-.707-.707M17.657 17.657l-.707-.707M12 21v-1"/></svg> تصحيح بالذكاء الاصطناعي`;
    }

    function renderAIFeedbackInline(result) {
        const box = document.getElementById('ai-feedback-box');
        if (!box) return;
        const color = result.correct ? 'appleGreen' : '#ff3b30';
        const colorClass = result.correct ? 'bg-green-50/40 dark:bg-green-900/20 border-green-300 dark:border-green-700' : 'bg-red-50/40 dark:bg-red-900/20 border-red-300 dark:border-red-700';
        const icon = result.correct
            ? `<svg class="w-5 h-5 text-appleGreen" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`
            : `<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`;
        box.innerHTML = `
            <div class="mt-4 p-4 rounded-xl border ${colorClass}">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2 font-semibold text-sm">${icon} تقييم الذكاء الاصطناعي</div>
                    <span class="text-2xl font-black" style="color:${color}">${result.score}/10</span>
                </div>
                <p class="text-sm leading-relaxed opacity-80">${result.feedback}</p>
            </div>`;
    }

    // ─── Results ──────────────────────────────────────────────────────────────
    function showResults() {
        const container = document.getElementById('question-container');
        document.getElementById('prev-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('progress-bar').parentElement.style.display = 'none';
        document.getElementById('unit-tag').innerText = 'تم إكمال التقييم';
        document.getElementById('progress-text').innerText = '';

        let mcqCorrect = 0, mcqTotal = 0, openTotal = 0, openScore = 0;
        examDatabase.forEach((q, idx) => {
            if (q.type === 'mcq') {
                mcqTotal++;
                if (userAnswers[idx] === q.answer) mcqCorrect++;
            } else if (q.type === 'open') {
                openTotal++;
                if (aiFeedback[idx]) openScore += aiFeedback[idx].score;
            }
        });

        const total = examDatabase.length;
        const mcqPct = mcqTotal ? Math.round((mcqCorrect / mcqTotal) * 100) : null;
        const openPct = openTotal ? Math.round((openScore / (openTotal * 10)) * 100) : null;

        let overallPct;
        if (mcqTotal && openTotal) overallPct = Math.round(((mcqCorrect / mcqTotal) * 0.5 + (openScore / (openTotal * 10)) * 0.5) * 100);
        else if (mcqTotal) overallPct = mcqPct;
        else overallPct = openPct || 0;

        container.innerHTML = `
            <div class="text-center py-4">
                <div class="inline-block p-4 rounded-full bg-appleGreen/10 text-appleGreen mb-4">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </div>
                <h3 class="text-2xl font-extrabold mb-2">تهانينا! أكملت المراجعة</h3>
                <p class="text-sm opacity-60 mb-6">نتيجة اختبارك الفورية:</p>
                <div class="text-5xl font-black text-appleBlue mb-4">${overallPct}%</div>
                ${mcqTotal ? `<p class="text-sm opacity-70 mb-1">✅ اختيار متعدد: ${mcqCorrect} / ${mcqTotal} صحيح</p>` : ''}
                ${openTotal ? `<p class="text-sm opacity-70 mb-1">🤖 أسئلة مفتوحة: ${openScore.toFixed(1)} / ${openTotal * 10} نقطة</p>` : ''}
                ${openTotal > 0 && openScore === 0 ? `<p class="text-xs opacity-50 mt-1">(الأسئلة المفتوحة غير المصححة لم تُحتسب)</p>` : ''}
                <button onclick="location.reload()" class="mt-8 bg-neutral-900 text-white dark:bg-white dark:text-black px-8 py-3 rounded-xl font-medium text-sm active:scale-95 transition-all">
                    إعادة المحاولة
                </button>
            </div>`;
    }

    // ─── Editor Modal ─────────────────────────────────────────────────────────
    let tempDB = [];
    let optionFields = []; // { text, correct }

    function openEditor() {
        tempDB = JSON.parse(JSON.stringify(examDatabase));
        optionFields = [{ text: '', correct: true }, { text: '', correct: false }, { text: '', correct: false }, { text: '', correct: false }];
        renderQuestionList();
        renderOptionFields();
        document.getElementById('editor-modal').classList.remove('hidden');
        document.getElementById('editor-modal').classList.add('flex');
    }

    function closeEditor() {
        document.getElementById('editor-modal').classList.add('hidden');
        document.getElementById('editor-modal').classList.remove('flex');
    }

    function applyAndClose() {
        examDatabase = JSON.parse(JSON.stringify(tempDB));
        currentIndex = 0;
        Object.keys(userAnswers).forEach(k => delete userAnswers[k]);
        Object.keys(aiFeedback).forEach(k => delete aiFeedback[k]);
        closeEditor();
        renderQuestion();
    }

    function renderQuestionList() {
        const list = document.getElementById('question-list');
        if (!tempDB.length) {
            list.innerHTML = `<p class="text-sm opacity-50 text-center py-2">لا توجد أسئلة بعد</p>`;
            return;
        }
        list.innerHTML = tempDB.map((q, i) => `
            <div class="liquid-glass rounded-xl px-4 py-3 flex items-center justify-between gap-3">
                <div class="flex items-center gap-3 overflow-hidden">
                    <span class="text-xs font-bold opacity-40 flex-shrink-0">${i + 1}</span>
                    <span class="text-sm font-medium truncate">${q.title}</span>
                    <span class="flex-shrink-0 text-xs px-2 py-0.5 rounded-full ${q.type === 'open' ? 'bg-purple-100 dark:bg-purple-900/40 text-purple-600 dark:text-purple-300' : 'bg-blue-100 dark:bg-blue-900/40 text-blue-600 dark:text-blue-300'}">
                        ${q.type === 'open' ? 'مفتوح' : 'اختيار'}
                    </span>
                </div>
                <button onclick="deleteQuestion(${i})" class="flex-shrink-0 text-red-400 hover:text-red-600 transition-colors p-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
            </div>`).join('');
    }

    function deleteQuestion(i) {
        tempDB.splice(i, 1);
        renderQuestionList();
    }

    function toggleTypeFields() {
        const type = document.getElementById('new-type').value;
        document.getElementById('mcq-fields').classList.toggle('hidden', type !== 'mcq');
        document.getElementById('open-fields').classList.toggle('hidden', type !== 'open');
    }

    function renderOptionFields() {
        const container = document.getElementById('options-list');
        container.innerHTML = optionFields.map((opt, i) => `
            <div class="flex items-center gap-2">
                <button onclick="setCorrectOption(${i})" class="flex-shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center transition-all ${opt.correct ? 'border-appleBlue bg-appleBlue' : 'border-neutral-400'}">
                    ${opt.correct ? '<div class="w-2 h-2 rounded-full bg-white"></div>' : ''}
                </button>
                <input type="text" placeholder="الخيار ${i + 1}" value="${opt.text}"
                    oninput="optionFields[${i}].text=this.value"
                    class="flex-1 bg-white/30 dark:bg-neutral-900/40 border border-black/10 dark:border-white/10 rounded-xl px-3 py-2 text-sm" />
                ${optionFields.length > 2 ? `<button onclick="removeOption(${i})" class="text-red-400 hover:text-red-600 transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>` : ''}
            </div>`).join('');
    }

    function setCorrectOption(i) {
        optionFields.forEach((o, j) => o.correct = j === i);
        renderOptionFields();
    }

    function addOptionField() {
        optionFields.push({ text: '', correct: false });
        renderOptionFields();
    }

    function removeOption(i) {
        const wasCorrect = optionFields[i].correct;
        optionFields.splice(i, 1);
        if (wasCorrect && optionFields.length) optionFields[0].correct = true;
        renderOptionFields();
    }

    function addQuestion() {
        const type = document.getElementById('new-type').value;
        const unit = document.getElementById('new-unit').value.trim() || 'عام';
        const title = document.getElementById('new-question').value.trim();

        if (!title) { alert('الرجاء كتابة نص السؤال'); return; }

        if (type === 'mcq') {
            const filledOptions = optionFields.filter(o => o.text.trim());
            if (filledOptions.length < 2) { alert('الرجاء إضافة خيارين على الأقل'); return; }
            const correctIdx = filledOptions.findIndex(o => o.correct);
            if (correctIdx < 0) { alert('الرجاء تحديد الإجابة الصحيحة'); return; }
            tempDB.push({
                id: Date.now(),
                unit, type,
                title,
                options: filledOptions.map(o => o.text.trim()),
                answer: correctIdx
            });
        } else {
            const modelAnswer = document.getElementById('new-model-answer').value.trim();
            tempDB.push({ id: Date.now(), unit, type, title, modelAnswer });
        }

        // Reset form
        document.getElementById('new-question').value = '';
        document.getElementById('new-unit').value = '';
        document.getElementById('new-model-answer').value = '';
        optionFields = [{ text: '', correct: true }, { text: '', correct: false }, { text: '', correct: false }, { text: '', correct: false }];
        renderOptionFields();
        renderQuestionList();
    }

    // ─── Dark Mode ────────────────────────────────────────────────────────────
        // Export / Import
    function exportTemplate() {
        if (!tempDB.length) { alert('لا توجد أسئلة للتصدير. أضف أسئلة أولاً.'); return; }
        const template = { name: "قالب اختبار", version: "1.0", created: new Date().toISOString(), questions: tempDB };
        const blob = new Blob([JSON.stringify(template, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'quiz-template-' + Date.now() + '.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    function importTemplate(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                const questions = Array.isArray(data) ? data : data.questions;
                if (!questions || !questions.length) { alert('الملف لا يحتوي على أسئلة صالحة.'); return; }
                const valid = questions.filter(q => q.title && q.type);
                if (!valid.length) { alert('لم يتم العثور على أسئلة صالحة في الملف.'); return; }
                valid.forEach(q => { q.id = Date.now() + Math.random(); });
                if (tempDB.length) {
                    const merge = confirm('تم العثور على ' + valid.length + ' سؤال.\nموافق = إضافة للموجود | إلغاء = استبدال الكل');
                    tempDB = merge ? [...tempDB, ...valid] : valid;
                } else {
                    tempDB = valid;
                }
                renderQuestionList();
                alert('تم استيراد ' + valid.length + ' سؤال بنجاح!');
            } catch(err) {
                alert('خطأ في قراءة الملف. تأكد أنه ملف JSON صالح.');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    function toggleDarkMode() {
        const html = document.documentElement;
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            localStorage.setItem('theme', 'light');
        } else {
            html.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    }

    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
    renderQuestion();
    </script>
</body>
